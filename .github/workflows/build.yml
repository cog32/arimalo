name: Build Release

# Cost discipline: only build when a release tag is pushed. Day-to-day
# pushes (orchestrator feature branches, PR commits) don't trigger CI;
# you find out about platform-specific breakage when you cut a release.
# Re-add a `pull_request` or `push: branches: [main]` trigger here if
# that tradeoff stops working.
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --verbose

      - name: Build relay server
        run: cd src-tauri && cargo build --release --bin arimalo-relay

      - name: Upload relay binary
        uses: actions/upload-artifact@v4
        with:
          name: arimalo-relay-${{ matrix.target }}
          path: |
            src-tauri/target/release/arimalo-relay
            src-tauri/target/release/arimalo-relay.exe
          if-no-files-found: warn

      - name: Upload Linux artifacts
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: arimalo-covid-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: arimalo-covid-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: arimalo-covid-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Flatten artifacts into release-assets with platform prefixes
          find artifacts/arimalo-covid-linux -type f \( -name "*.deb" -o -name "*.AppImage" \) -exec cp {} release-assets/ \; 2>/dev/null || true
          find artifacts/arimalo-covid-macos -type f \( -name "*.dmg" \) -exec cp {} release-assets/ \; 2>/dev/null || true
          # Zip the .app bundle for macOS
          if [ -d "artifacts/arimalo-covid-macos" ]; then
            find artifacts/arimalo-covid-macos -type d -name "*.app" -exec sh -c 'cd "$(dirname "{}")" && zip -r "../../../release-assets/$(basename "{}").zip" "$(basename "{}")"' \; 2>/dev/null || true
          fi
          find artifacts/arimalo-covid-windows -type f \( -name "*.msi" -o -name "*.exe" \) -exec cp {} release-assets/ \; 2>/dev/null || true
          # Copy relay binaries with platform suffix
          cp artifacts/arimalo-relay-linux/arimalo-relay release-assets/arimalo-relay-linux 2>/dev/null || true
          cp artifacts/arimalo-relay-macos/arimalo-relay release-assets/arimalo-relay-macos 2>/dev/null || true
          cp artifacts/arimalo-relay-windows/arimalo-relay.exe release-assets/arimalo-relay-windows.exe 2>/dev/null || true
          ls -la release-assets/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
